name: Tests de Cloud Functions

# Corre automáticamente cada vez que subes cambios a main, o abres un
# Pull Request contra main — así te enteras si algo se rompió ANTES de
# hacer merge/deploy, no después.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node 22 (misma versión que usa Firebase)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Correr los tests
        run: npm test
